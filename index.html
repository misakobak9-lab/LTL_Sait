<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTL PRESTIGE | HUB 30.03</title>
    
    <style>
        :root {
            --brand: linear-gradient(135deg, #ff9800 0%, #ff5722 100%);
            --bg-deep: #020406;
            --bg-card: linear-gradient(180deg, #0a1119 0%, #05080c 100%);
            --bg-inner: linear-gradient(145deg, #151d29 0%, #0d121a 100%);
            --border: rgba(255, 255, 255, 0.1);
            --gold: linear-gradient(180deg, #ffd700 0%, #daa520 100%);
            --text-h: #ffffff;
            --text-m: #a5adb9;
            --transit: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body {
            background-color: var(--bg-deep);
            color: var(--text-h);
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -10%, #1c2a3d 0%, #020406 80%);
            overflow: hidden; height: 100vh;
        }

        /* НАВИГАЦИЯ */
        header {
            background: rgba(2, 4, 6, 0.96); backdrop-filter: blur(20px);
            border-bottom: 5px solid #ff9800; padding: 20px 8%;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .logo h1 { font-size: 32px; font-weight: 1000; letter-spacing: 8px; background: var(--brand); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .nav { display: flex; gap: 10px; }
        .nav-btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            color: var(--text-m); font-weight: 800; font-size: 11px;
            text-transform: uppercase; padding: 12px 20px; border-radius: 10px; cursor: pointer; transition: var(--transit);
        }
        .nav-btn.active { background: var(--brand); color: #000; border: none; }

        main { padding: 40px 8%; height: calc(100vh - 100px); overflow-y: auto; }
        .view { display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* КАРТОЧКИ КОМАНД (КЛИКАБЕЛЬНЫЕ) */
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .team-card-small {
            background: var(--bg-inner); border: 1px solid var(--border); border-radius: 20px;
            padding: 30px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .team-card-small:hover { border-color: #ff9800; transform: scale(1.03); background: rgba(255,152,0,0.05); }
        .team-card-small h3 { font-weight: 1000; text-transform: uppercase; letter-spacing: 1px; }

        /* МОДАЛЬНЫЕ ОКНА */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
        }
        .modal-content {
            background: var(--bg-card); border: 2px solid #ff9800; border-radius: 30px;
            width: 90%; max-width: 800px; padding: 40px; position: relative;
            animation: zoomIn 0.3s ease;
        }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; color: #ff9800; }

        /* СПИСОК ИГРОКОВ В МОДАЛКЕ */
        .player-list { list-style: none; margin-top: 20px; }
        .player-item {
            background: rgba(255,255,255,0.03); margin-bottom: 10px; padding: 15px 25px;
            border-radius: 15px; cursor: pointer; font-weight: 900; font-size: 18px;
            display: flex; justify-content: space-between; transition: 0.2s;
        }
        .player-item:hover { background: #ff9800; color: #000; }

        /* ПРОФИЛЬ ИГРОКА (СИЛУЭТ) */
        .profile-flex { display: flex; gap: 40px; align-items: center; }
        .silhouette {
            width: 200px; height: 300px; background: url('https://www.pngall.com/wp-content/uploads/5/User-Profile-PNG-High-Quality-Image.png') no-repeat center;
            background-size: contain; filter: brightness(0.5) sepia(1) saturate(5) hue-rotate(-30deg);
        }
        .info-box { flex: 1; }
        .info-line { border-bottom: 1px solid var(--border); padding: 10px 0; font-weight: 800; font-size: 18px; }
        .info-label { color: #ff9800; text-transform: uppercase; font-size: 12px; display: block; margin-bottom: 5px; }

        /* РЕЙТИНГ */
        .table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .tr { background: var(--bg-inner); border-radius: 15px; }
        .td { padding: 25px; font-weight: 1000; font-size: 22px; text-transform: uppercase; }
        .td:first-child { border-radius: 15px 0 0 15px; width: 80px; text-align: center; }
        .td:last-child { border-radius: 0 15px 15px 0; text-align: right; color: #ff9800; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.reload()"><h1>LTL-PRESTIGE</h1></div>
        <nav class="nav">
            <button class="nav-btn" id="b-news" onclick="v('news')">Новости</button>
            <button class="nav-btn" id="b-rating" onclick="v('rating')">Рейтинг</button>
            <button class="nav-btn" id="b-teams" onclick="v('teams')">Команды</button>
            <button class="nav-btn" id="b-trans" onclick="v('trans')">Трансферы</button>
        </nav>
    </header>

    <main>
        <div id="v-rating" class="view">
            <h2 style="margin-bottom:20px; text-transform:uppercase;">Таблица Лидеров</h2>
            <table class="table">
                <tr class="tr"><td class="td" style="color:#ffd700">1</td><td class="td">GEN3</td><td class="td">37 PTS</td></tr>
                <tr class="tr"><td class="td" style="color:#c0c0c0">2</td><td class="td">Plaxon Team</td><td class="td">35 PTS</td></tr>
                <tr class="tr"><td class="td" style="color:#cd7f32">3</td><td class="td">GA</td><td class="td">20 PTS</td></tr>
                <tr class="tr"><td class="td">4</td><td class="td">PLOHISHI</td><td class="td">7 PTS</td></tr>
                <tr class="tr"><td class="td">5</td><td class="td">BPMP</td><td class="td">5 PTS</td></tr>
            </table>
        </div>

        <div id="v-teams" class="view">
            <div class="team-grid" id="teams-list">
                </div>
        </div>

        <div id="v-trans" class="view">
            <div class="team-card-small" style="text-align:left; border-left: 5px solid #ff9800;">
                <span style="color:#ff9800; font-weight:1000;">30 МАРТА 2026</span>
                <h2 style="margin:10px 0;">EX-ECHOFALL AC ➜ PLAXON TEAM</h2>
                <p>Весь состав организации Echofall переходит под тег Plaxon.</p>
                <hr style="margin:15px 0; opacity:0.1;">
                <h3>CUBO ➜ BPMP (COACH)</h3>
            </div>
        </div>

        <div id="v-news" class="view">
            <div class="team-card-small" style="border: 2px solid #ffd700;">
                <h1 style="color:#ffd700">GEN3 — ЧЕМПИОНЫ XTX!</h1>
                <p style="margin-top:10px;">Победа 2:0 в гранд-финале против GA.</p>
            </div>
        </div>
    </main>

    <div id="teamModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('teamModal')">&times;</span>
            <h2 id="modalTeamName" style="color:#ff9800; text-transform:uppercase; font-size:30px;"></h2>
            <ul class="player-list" id="modalPlayerList"></ul>
        </div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('playerModal')">&times;</span>
            <div class="profile-flex">
                <div class="silhouette"></div>
                <div class="info-box" id="playerDetails">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const teamsData = [
            { name: "GEN3", players: [
                {n: "RaZzychka", tg: "@razzychka", st: "1.28 HLTV"},
                {n: "Gho1l", tg: "-", st: "1.10 HLTV"},
                {n: "pupap1", tg: "-", st: "1.05 HLTV"},
                {n: "yanimagu", tg: "-", st: "1.02 HLTV"},
                {n: "chydno1", tg: "-", st: "1.15 HLTV"}
            ]},
            { name: "GA", players: [
                {n: "fR0-ST", tg: "@frost_news", st: "1.45 HLTV"},
                {n: "milaps", tg: "-", st: "1.20 HLTV"},
                {n: "Weather", tg: "@weather_cs", st: "1.43 HLTV"},
                {n: "KotixxXX", tg: "-", st: "1.18 HLTV"},
                {n: "N3XXTXD", tg: "-", st: "1.20 HLTV"}
            ]},
            { name: "Plaxon Team", players: [
                {n: "spokyso", tg: "-", st: "1.10 HLTV"},
                {n: "AVR1x", tg: "-", st: "1.05 HLTV"},
                {n: "m0rb1e", tg: "-", st: "1.08 HLTV"},
                {n: "Deyoshi", tg: "-", st: "0.99 HLTV"},
                {n: "CarteZ", tg: "-", st: "1.12 HLTV"}
            ]},
            { name: "BPMP", players: [
                {n: "LeetOnsy", tg: "-", st: "1.15 HLTV"},
                {n: "wanter", tg: "-", st: "1.05 HLTV"},
                {n: "W1rr0U", tg: "-", st: "1.10 HLTV"},
                {n: "Gofan!", tg: "-", st: "1.08 HLTV"},
                {n: "Hokage", tg: "-", st: "1.02 HLTV"},
                {n: "Cubo (COACH)", tg: "-", st: "STRAT-GENIUS"}
            ]},
            { name: "Quantum ESPORT", players: [{n: "matana_VOL", tg: "-"}, {n: "bloodshed", tg: "-"}, {n: "dalbanzik", tg: "-"}, {n: "Batonesy", tg: "-"}, {n: "Agera", tg: "-"}]},
            { name: "PLOHISHI", players: [{n: "Patemon", tg: "-"}, {n: "Turbo", tg: "-"}, {n: "C1t1Q", tg: "-"}, {n: "Waravmax", tg: "-"}, {n: "Markbon", tg: "-"}]},
            { name: "EVEREES TEAM", players: [{n: "D1xer_51", tg: "-"}, {n: "w1nlays", tg: "-"}, {n: "rebornixxx", tg: "-"}, {n: "OneShot", tg: "-"}, {n: "Kalex", tg: "-"}]},
            { name: "team 61", players: [{n: "Lov3zzy", tg: "-"}, {n: "Altreezz", tg: "-"}, {n: "farrr", tg: "-"}, {n: "Kurok1sh1", tg: "-"}, {n: "xied1x", tg: "-"}]},
            { name: "Mentality team", players: [{n: "SKV1ZERD", tg: "-"}, {n: "Lixozen", tg: "-"}, {n: "Moccastar", tg: "-"}, {n: "Instalfreim", tg: "-"}, {n: "C1cn1", tg: "-"}]},
            { name: "FRACTAL TEAM", players: [{n: "s1to666", tg: "-"}, {n: "Nixie", tg: "-"}, {n: "Vero1ksit", tg: "-"}, {n: "Fridar_fair", tg: "-"}, {n: "kayserrr", tg: "-"}]}
        ];

        function v(id) {
            document.querySelectorAll('.view').forEach(e => e.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('v-' + id).style.display = 'block';
            document.getElementById('b-' + id).classList.add('active');
            if(id === 'teams') renderTeams();
        }

        function renderTeams() {
            const grid = document.getElementById('teams-list');
            grid.innerHTML = teamsData.map(t => `
                <div class="team-card-small" onclick="showTeam('${t.name}')">
                    <h3>${t.name}</h3>
                </div>
            `).join('');
        }

        function showTeam(name) {
            const team = teamsData.find(t => t.name === name);
            document.getElementById('modalTeamName').innerText = team.name;
            const list = document.getElementById('modalPlayerList');
            list.innerHTML = team.players.map(p => `
                <li class="player-item" onclick="showPlayer('${p.n}', '${team.name}')">
                    ${p.n} <span>➜</span>
                </li>
            `).join('');
            document.getElementById('teamModal').style.display = 'flex';
        }

        function showPlayer(pName, tName) {
            const team = teamsData.find(t => t.name === tName);
            const p = team.players.find(pl => pl.n === pName);
            const details = document.getElementById('playerDetails');
            details.innerHTML = `
                <h1 style="font-size:45px; margin-bottom:20px;">${p.n}</h1>
                <div class="info-line"><span class="info-label">ТГК:</span> ${p.tg || '—'}</div>
                <div class="info-line"><span class="info-label">КОМАНДА:</span> ${tName}</div>
                <div class="info-line"><span class="info-label">СТАТИСТИКА:</span> ${p.st || '1.00 HLTV'}</div>
            `;
            document.getElementById('playerModal').style.display = 'flex';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        window.onclick = function(event) {
            if (event.target.className === 'modal') { event.target.style.display = 'none'; }
        }

        window.onload = () => v('rating');
    </script>
</body>
</html>
