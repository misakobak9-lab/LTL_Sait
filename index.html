<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTL.com | Official</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #ffffff 100%);
            --accent: #2d3436;
            --sub-text: #636e72;
            --card-bg: rgba(255, 255, 255, 0.8);
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --green: #00b894;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body { 
            background: var(--bg-gradient); 
            color: var(--accent); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { padding: 40px 8%; text-align: center; }
        .logo { font-size: 42px; font-weight: 900; letter-spacing: -1px; color: var(--accent); text-decoration: none; }
        .logo span { color: var(--green); }

        main { flex: 1; width: 90%; max-width: 600px; text-align: center; padding-top: 50px; }

        .dev-badge {
            display: inline-block;
            background: #dfe6e9;
            color: var(--sub-text);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        h2 { font-size: 32px; margin-bottom: 15px; font-weight: 800; }
        p { color: var(--sub-text); margin-bottom: 40px; line-height: 1.6; }

        /* Форма предложки */
        .suggestion-box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.03);
            backdrop-filter: blur(10px);
        }

        .suggestion-box h3 { font-size: 18px; margin-bottom: 20px; font-weight: 700; }

        input, textarea {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #dfe6e9;
            background: #f9f9f9;
            font-size: 14px;
            margin-bottom: 15px;
            outline: none;
            transition: 0.3s;
        }

        textarea { height: 120px; resize: none; }
        input:focus, textarea:focus { border-color: var(--green); background: #fff; }

        .send-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .send-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        footer { padding: 40px; font-size: 13px; color: #b2bec3; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">LTL<span>.</span>com</a>
</header>

<main>
    <div class="dev-badge">Status: Maintenance</div>
    <h2>В разработке</h2>
    <p>Мы переезжаем на новый дизайн. Есть идеи по функционалу? Напиши нам!</p>

    <!-- Форма отправки на почту -->
    <div class="suggestion-box">
        <h3>Предложить идею</h3>
        <!-- Замени ЗДЕСЬ_БУДЕТ_ТВОЙ_ID на ID от Formspree -->
        <form action="https://formspree.io/f/ЗДЕСЬ_БУДЕТ_ТВОЙ_ID" method="POST">
            <input type="email" name="email" placeholder="Твой Email (для обратной связи)" required>
            <textarea name="message" placeholder="Опиши свою идею или новость..." required></textarea>
            <button type="submit" class="send-btn">Отправить на почту</button>
        </form>
    </div>
</main>

<footer>
    &copy; 2026 LTL Community | misakobak9@gmail.com
</footer>

</body>
</html>
