<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мини-Стратегия: Оборона 1941</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: #1a1a1a;
            color: #d4d4d4;
            padding: 20px;
        }
        h1, h2 { color: #e0a96d; }
        .container { display: flex; gap: 20px; }
        .panel {
            background: #2c2c2c;
            border: 2px solid #3c3c3c;
            padding: 15px;
            border-radius: 5px;
        }
        .map-panel { flex: 2; }
        .info-panel { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .division-card {
            background: #3a3a3a;
            border: 1px solid #555;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .division-card.selected { border-color: #e0a96d; background: #4a4a4a; }
        .map-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .cell {
            background: #252525;
            border: 1px solid #444;
            min-height: 80px;
            padding: 5px;
            position: relative;
        }
        .cell.river { border-left: 4px solid #3498db; }
        .cell.city { background: #34495e; }
        .cell.captured { border: 1px solid #c0392b; }
        .btn {
            background: #e0a96d;
            color: #1a1a1a;
            border: none;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .btn:hover { background: #cca16e; }
        #news-ticker {
            background: #000;
            color: #00ff00;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #333;
            min-height: 40px;
        }
    </style>
</head>
<body>

    <h1>Фронтовая Сводка: 1941</h1>
    
    <div id="news-ticker">> Ситуация на фронте стабильно напряженная. Командование ожидает ваших приказов.</div>

    <div class="container">
        <div class="panel map-panel">
            <h2>Карта боевых действий</h2>
            <p><small>*Синие левые границы — река (дает бонус к обороне). Темные клетки — города.</small></p>
            <div class="map-grid" id="map"></div>
        </div>

        <div class="info-panel">
            <div class="panel">
                <h2>Ваши Дивизии</h2>
                <div id="divisions-list"></div>
            </div>
            
            <div class="panel">
                <h2>Действия</h2>
                <button class="btn" onclick="nextTurn()">Завершить ход</button>
            </div>
        </div>
    </div>

<script>
// Данные карты (Упрощенная линия фронта из 5 секторов)
const mapData = [
    { id: 0, name: "Западный Рубеж", type: "field", river: false, enemyStrength: 80, playerDivs: [], captured: false },
    { id: 1, name: "Минский Узел", type: "city", river: false, enemyStrength: 120, playerDivs: [], captured: false },
    { id: 2, name: "Рубеж р. Днепр", type: "field", river: true, enemyStrength: 90, playerDivs: [], captured: false },
    { id: 3, name: "Смоленские высоты", type: "field", river: false, enemyStrength: 100, playerDivs: [], captured: false },
    { id: 4, name: "Киевский Укреп Район", type: "city", river: true, enemyStrength: 150, playerDivs: [], captured: false }
];

// Ваши войска
let divisions = [
    { id: 1, name: "19-я Стрелковая дивизия", strength: 100, supply: 100, location: 2 },
    { id: 2, name: "100-я Ордена Ленина дивизия", strength: 100, supply: 100, location: 4 },
    { id: 3, name: "5-й Мехкорпус (Остатки)", strength: 80, supply: 80, location: 0 }
];

let selectedDivisionId = null;
let currentTurn = 1;

// Инициализация игры
function initGame() {
    updateMapData();
    renderMap();
    renderDivisions();
}

function updateMapData() {
    mapData.forEach(cell => cell.playerDivs = []);
    divisions.forEach(div => {
        if(div.strength > 0) {
            mapData[div.location].playerDivs.push(div);
        }
    });
}

// Отрисовка карты
function renderMap() {
    const mapEl = document.getElementById('map');
    mapEl.innerHTML = '';
    
    mapData.forEach(cell => {
        const cellDiv = document.createElement('div');
        cellDiv.className = `cell ${cell.type === 'city' ? 'city' : ''} ${cell.river ? 'river' : ''} ${cell.captured ? 'captured' : ''}`;
        
        let divsText = cell.playerDivs.map(d => `• ${d.name} (${d.strength}%)`).join('<br>');
        
        cellDiv.innerHTML = `
            <strong>${cell.name}</strong><br>
            <small>Враг: ${cell.captured ? 'Занято' : cell.enemyStrength + ' сил'}</small><br>
            <div style="margin-top:5px; font-size:12px; color:#e0a96d;">${divsText}</div>
        `;
        
        // Приклик на клетку — перемещаем туда выбранную дивизию
        cellDiv.onclick = () => {
            if (selectedDivisionId !== null) {
                moveDivision(selectedDivisionId, cell.id);
            }
        };
        
        mapEl.appendChild(cellDiv);
    });
}

// Отрисовка списка дивизий
function renderDivisions() {
    const listEl = document.getElementById('divisions-list');
    listEl.innerHTML = '';
    
    divisions.forEach(div => {
        if (div.strength <= 0) return;
        
        const divCard = document.createElement('div');
        divCard.className = `division-card ${selectedDivisionId === div.id ? 'selected' : ''}`;
        divCard.innerHTML = `
            <strong>${div.name}</strong><br>
            Численность: ${div.strength}% | Снабжение: ${div.supply}%<br>
            Позиция: ${mapData[div.location].name}
        `;
        
        divCard.onclick = (e) => {
            e.stopPropagation();
            selectedDivisionId = selectedDivisionId === div.id ? null : div.id;
            renderDivisions();
        };
        
        listEl.appendChild(divCard);
    });
}

// Механика перемещения
function moveDivision(divId, targetCellId) {
    const div = divisions.find(d => d.id === divId);
    div.location = targetCellId;
    selectedDivisionId = null;
    
    logNews(`Приказ: ${div.name} перебрасывается в сектор "${mapData[targetCellId].name}".`);
    
    updateMapData();
    renderMap();
    renderDivisions();
}

// Лог новостей
function logNews(text) {
    document.getElementById('news-ticker').innerText = `> ${text}`;
}

// Логика конца хода (Расчет боя и окружений)
function nextTurn() {
    currentTurn++;
    
    // 1. Проверка снабжения (простейшая симуляция окружения)
    // Если дивизия стоит в секторе, где врагов в 2 раза больше, чем сил дивизии, снабжение падает
    divisions.forEach(div => {
        const cell = mapData[div.location];
        if (cell.enemyStrength > div.strength * 1.5) {
            div.supply -= 30;
            logNews(`Внимание: ${div.name} под угрозой окружения! Нарушено снабжение.`);
        } else if (div.supply < 100) {
            div.supply = Math.min(100, div.supply + 10); // Восстановление
        }
        
        if (div.supply <= 0) {
            div.strength -= 20; // Истощение от окружения
            logNewsКриcritical(`Катастрофа: ${div.name} истощена без боеприпасов!`);
        }
    });

    // 2. Симуляция боев
    mapData.forEach(cell => {
        if (cell.playerDivs.length > 0 && !cell.captured) {
            let totalPlayerStrength = cell.playerDivs.reduce((sum, d) => sum + d.strength, 0);
            
            // Бонусы местности
            if (cell.river) totalPlayerStrength += 30; // Река помогает обороне
            if (cell.type === 'city') totalPlayerStrength += 50; // Город — крепость
            
            // Расчет потерь
            if (cell.enemyStrength > totalPlayerStrength) {
                cell.playerDivs.forEach(d => d.strength -= 15);
                cell.enemyStrength -= 10;
                logNews(`Тяжелые бои в секторе ${cell.name}. Наши силы отступают.`);
            } else {
                cell.enemyStrength -= 20;
                cell.playerDivs.forEach(d => d.strength -= 5);
                logNews(`Атака врага отбита в секторе ${cell.name}!`);
            }
            
            if (cell.enemyStrength <= 0) cell.enemyStrength = 0;
        } else if (!cell.captured) {
            // Враг продвигается, если сектор пуст
            cell.enemyStrength += 10;
            if (cell.enemyStrength > 130) {
                cell.captured = true;
                logNews(`Потерян контроль над сектором: ${cell.name}!`);
            }
        }
    });

    // Случайное историческое событие (как в HoI)
    const events = [
        "Сводка Совинформбюро: Заводы Урала удвоили выпуск танков Т-34. Пополнение прибудет позже.",
        "Партизаны подорвали склады снабжения противника в тылу.",
        "Осенняя распутица замедляет продвижение танковых колонн врага."
    ];
    if (Math.random() > 0.5) {
        logNews(`[ИВЕНТ] ${events[Math.floor(Math.random() * events.length)]}`);
    }

    updateMapData();
    renderMap();
    renderDivisions();
}

// Старт
initGame();
</script>
</body>
</html>
