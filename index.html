<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTL PRESTIGE | FULL HUB</title>
    <style>
        :root {
            --brand-g: linear-gradient(135deg, #ff9800 0%, #ff5722 50%, #e91e63 100%);
            --brand-neon: 0 0 40px rgba(255, 87, 34, 0.7);
            --bg-deep: #020406;
            --glass: rgba(255, 255, 255, 0.03);
            --text-h: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { 
            background-color: var(--bg-deep); 
            color: var(--text-h); 
            background: linear-gradient(45deg, #020406, #0d1117, #020406);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            background-attachment: fixed; 
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(2, 4, 6, 0.9); backdrop-filter: blur(25px);
            border-bottom: 2px solid transparent; border-image: var(--brand-g) 1;
            padding: 15px 8%; display: flex; justify-content: space-between; align-items: center;
        }

        .logo h1 { font-size: 28px; font-weight: 1000; letter-spacing: 4px; background: var(--brand-g); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .nav-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-weight: 900; font-size: 10px; text-transform: uppercase; padding: 10px 18px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-left: 8px; }
        .nav-btn.active { background: var(--brand-g); color: #000; border: none; box-shadow: var(--brand-neon); }

        main { padding: 30px 8%; max-width: 1250px; margin: 0 auto; }
        .view { display: none; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .m-title { font-size: 26px; font-weight: 1000; margin: 30px 0 15px; text-transform: uppercase; background: var(--brand-g); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { 
            background: var(--glass); border-radius: 20px; padding: 40px 20px; text-align: center; 
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; font-weight: 1000; cursor: pointer; 
            text-transform: uppercase;
        }
        .card:hover { border-color: #ff9800; box-shadow: var(--brand-neon); transform: translateY(-5px); }

        .table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .tr { background: var(--glass); transition: 0.2s; cursor: pointer; border-radius: 15px; }
        .tr:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); box-shadow: var(--brand-neon); }
        .td { padding: 20px; font-weight: 900; text-transform: uppercase; }
        .td-val { text-align: right; color: #ff9800; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(15px); }
        .modal-content { background: #0a0c10; border: 2px solid transparent; border-image: var(--brand-g) 1; border-radius: 10px; width: 90%; max-width: 480px; padding: 35px; box-shadow: var(--brand-neon); }
        .p-row { background: rgba(255,255,255,0.04); padding: 18px; margin-bottom: 8px; border-radius: 12px; display: flex; justify-content: space-between; font-weight: 900; }
        .close-btn { background: var(--brand-g); color: #000; border: none; font-weight: 1000; padding: 18px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 20px; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <div class="logo"><h1>LTL-PRESTIGE</h1></div>
    <nav>
        <button class="nav-btn active" onclick="v('home', this)">Главная</button>
        <button class="nav-btn" onclick="v('teams', this)">Команды</button>
        <button class="nav-btn" onclick="v('transfers', this)">Трансферы</button>
        <button class="nav-btn" onclick="v('rank', this)">Рейтинг</button>
    </nav>
</header>

<main>
    <div id="v-home" class="view" style="display: block;">
        <div style="background: var(--brand-g); padding: 45px; border-radius: 25px; color: #000; text-align: center; box-shadow: var(--brand-neon); margin-bottom: 30px;">
            <h2 style="font-size: 36px; font-weight: 1000;">GA VICTORY! 🏆</h2>
            <p style="font-weight: 900; margin-top: 10px; letter-spacing: 1px;">ПОБЕДА НАД FRACTAL TEAM (2:0) | GA +5 PTS</p>
        </div>
    </div>

    <div id="v-teams" class="view">
        <h2 class="m-title">Организации</h2>
        <div class="grid" id="t-grid"></div>
    </div>

    <div id="v-transfers" class="view">
        <h2 class="m-title">Transfer Window</h2>
        <table class="table">
            <tr class="tr"><td class="td">FullZ3r0 ➔ GA</td><td class="td td-val">OFFICIAL</td></tr>
            <tr class="tr"><td class="td">m1laps ➔ GA</td><td class="td td-val">OFFICIAL</td></tr>
            <tr class="tr"><td class="td">Vero1ksit ➔ Fractal Team</td><td class="td td-val">OFFICIAL</td></tr>
            <tr class="tr"><td class="td">Gofan! ➔ BPMP</td><td class="td td-val">OFFICIAL</td></tr>
            <tr class="tr"><td class="td">Cubo ➔ BPMP (Coach)</td><td class="td td-val">OFFICIAL</td></tr>
        </table>
    </div>

    <div id="v-rank" class="view">
        <h2 class="m-title">Таблица Очков</h2>
        <table class="table" id="r-table"></table>
        <h2 class="m-title" style="margin-top: 50px;">Top 5 Players</h2>
        <table class="table" id="p-table"></table>
    </div>
</main>

<div id="tModal" class="modal"><div class="modal-content"><h2 id="m-tname" style="color:#ff9800; font-size:28px; margin-bottom:20px; text-transform: uppercase; text-align:center; font-weight:1000;"></h2><div id="m-plist"></div><button onclick="closeM()" class="close-btn">Закрыть</button></div></div>

<script>
    const teams = [
        { n: "GA", p: 33, pl: ["N3XXT", "m1laps", "FullZ3r0", "fR0-sT", "Kot1x*", "Weather"] },
        { n: "GEN3", p: 37, pl: ["RaZzychka", "Gho1l", "pupap1", "yanimagu", "chydno1"], sub: ["FOsor31", "Tapik", "ka1yat0"] },
        { n: "Plaxon Team", p: 35, pl: ["1ntER", "soj", "antikyla", "x1no"] },
        { n: "Ance Team", p: 0, pl: ["m1dor3", "WeyZ1", "HOLLY SHIT", "Onlys1dj", "1CE", "Rar3"] },
        { n: "NUST ORGANIZATIONS", p: 0, pl: ["Sasha_sakin (test)"] },
        { n: "Quantum ESPORT", p: 18, pl: ["matana_VOL", "bloodshed", "dalbanzik", "Batonesy", "Agera"], coach: "ottykpok" },
        { n: "ECHOFALL", p: 15, pl: ["spokyso", "AVR1x", "m0rb1e", "Deyoshi", "CarteZ"] },
        { n: "PLOHISHI", p: 7, pl: ["Patemon", "Turbo", "C1t1Q", "Waravmax", "Markbon"] },
        { n: "BPMP", p: 5, pl: ["LeetOnsy", "wanter", "W1rr0U", "Gofan!", "Hokage"], coach: "Cubo" },
        { n: "EVEREES TEAM", p: 2, pl: ["D1xer_51", "w1nlays", "rebornixxx", "OneShot", "Kalex"] },
        { n: "team 61", p: 1, pl: ["Lov3zzy", "Altreezz", "farrr", "Kurok1sh1", "xied1x"] },
        { n: "Mentality team", p: 0, pl: ["SKV1ZERD", "Lixozen", "Moccastar", "Instalfreim", "C1cn1"] },
        { n: "FRACTAL TEAM", p: 0, pl: ["N1xie", "Fridar_fair", "kayserrr", "s1to666", "Vero1ksit"] }
    ];

    const playerStats = { 
        "N3XXT": "1.70", "m1laps": "1.51", "FullZ3r0": "1.48", 
        "1ntER": "1.45", "antikyla": "1.40" 
    };

    function v(id, btn) {
        document.querySelectorAll('.view').forEach(e => e.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('v-' + id).style.display = 'block';
        btn.classList.add('active');
        if(id === 'teams') rt();
        if(id === 'rank') rr();
    }

    function rt() {
        document.getElementById('t-grid').innerHTML = teams.map(t => `<div class="card" onclick="st('${t.n}')">${t.n}</div>`).join('');
    }

    function rr() {
        document.getElementById('r-table').innerHTML = [...teams].sort((a,b)=>b.p-a.p).map((t,i)=>`<tr class="tr" onclick="st('${t.n}')"><td class="td">${i+1}</td><td class="td">${t.n}</td><td class="td td-val">${t.p} PTS</td></tr>`).join('');
        const topP = Object.entries(playerStats).sort((a,b)=>b[1]-a[1]);
        document.getElementById('p-table').innerHTML = topP.map((p,i)=>`<tr class="tr"><td class="td">${i+1}</td><td class="td">${p[0]}</td><td class="td td-val">${p[1]}</td></tr>`).join('');
    }

    function st(n) {
        const t = teams.find(x => x.n === n);
        document.getElementById('m-tname').innerText = t.n;
        let h = t.pl.map(p => `<div class="p-row"><span>${p}</span><span style="color:#ff9800">${playerStats[p] || "1.00"}</span></div>`).join('');
        if(t.coach) h += `<div class="p-row" style="color:#4caf50"><span>${t.coach}</span><span>COACH</span></div>`;
        document.getElementById('m-plist').innerHTML = h;
        document.getElementById('tModal').style.display = 'flex';
    }

    function closeM() { document.getElementById('tModal').style.display = 'none'; }
    window.onload = () => { rt(); rr(); };
</script>
</body>
</html>
