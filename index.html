<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LTL.com | Esports Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fcfcfd;
            --accent: #0f172a;
            --sub-text: #64748b;
            --border: #e2e8f0;
            --green-grad: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            --red-grad: linear-gradient(135deg, #ff7675 0%, #d63031 100%);
            --hover-light: rgba(0, 184, 148, 0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--accent); overflow-x: hidden; }

        header { 
            padding: 15px 5%; 
            display: flex; flex-direction: column; gap: 15px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; 
        }
        @media (min-width: 768px) { header { flex-direction: row; justify-content: space-between; padding: 20px 8%; } }

        .logo { font-size: 24px; font-weight: 900; cursor: pointer; text-decoration: none; color: inherit; letter-spacing: -1px; }
        .logo span { background: var(--green-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        nav { display: flex; gap: 15px; overflow-x: auto; scrollbar-width: none; }
        .nav-link { text-decoration: none; color: var(--sub-text); font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; padding: 5px 0; white-space: nowrap; transition: 0.2s; }
        .nav-link.active { color: var(--accent); border-bottom: 2px solid #00b894; }

        main { padding: 30px 5%; max-width: 1100px; margin: 0 auto; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Таблица рейтинга */
        .ranking-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 10px; }
        .ranking-table th { text-align: left; padding: 10px; font-size: 10px; text-transform: uppercase; color: var(--sub-text); letter-spacing: 1px; }
        .team-row { cursor: pointer; transition: transform 0.1s; }
        .team-row:active { transform: scale(0.98); }
        .team-row td { padding: 20px 15px; background: #fff; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); font-weight: 700; }
        .team-row td:first-child { border-left: 1px solid var(--border); border-radius: 12px 0 0 12px; }
        .team-row td:last-child { border-right: 1px solid var(--border); border-radius: 0 12px 12px 0; text-align: right; }
        .team-row:hover td { background: var(--hover-light); }

        /* Очки (PTS) */
        .pts-val { 
            background: var(--green-grad); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-weight: 900; 
            font-size: 16px; 
            display: inline-block;
        }

        /* Новости */
        .news-card { padding: 25px; background: #fff; border: 1px solid var(--border); border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .news-tag { display: inline-block; padding: 4px 10px; background: var(--green-grad); color: #fff; border-radius: 6px; font-weight: 800; font-size: 9px; text-transform: uppercase; margin-bottom: 12px; }

        /* Модальное окно */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; overflow-y: auto; padding: 40px 5%; }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 35px; cursor: pointer; line-height: 1; }

        .modal-header { text-align: center; margin-bottom: 30px; }
        .match-stat-btn { 
            background: #f8fafc; padding: 20px; border-radius: 15px; border: 1px solid var(--border); 
            margin: 20px 0; display: block; text-decoration: none; color: inherit;
            transition: 0.2s; border-left: 4px solid #00b894;
        }
        .match-stat-btn:hover { border-color: #00b894; background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        .roster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 15px; margin-top: 20px; }
        .player-card { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .p-name { font-weight: 800; font-size: 14px; margin-top: 8px; }
        .p-stat { font-size: 11px; color: var(--sub-text); margin-top: 4px; font-weight: 600; }

        /* Трансферы */
        .transfer-card { background: #fff; border: 1px solid var(--border); padding: 20px; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
        .t-nick { font-weight: 900; font-size: 16px; color: var(--accent); }
        .t-arrow { color: #00b894; font-weight: 900; margin: 0 10px; }

        footer { padding: 40px; text-align: center; font-size: 11px; color: var(--sub-text); border-top: 1px solid var(--border); margin-top: 50px; }
    </style>
</head>
<body onload="showTab('teams')">

<header>
    <a class="logo" onclick="showTab('teams')">LTL<span>.</span>com</a>
    <nav>
        <a class="nav-link" id="link-news" onclick="showTab('news')">Новости</a>
        <a class="nav-link" id="link-teams" onclick="showTab('teams')">Команды</a>
        <a class="nav-link" id="link-transfers" onclick="showTab('transfers')">Трансферы</a>
    </nav>
</header>

<main>
    <div id="tab-news" class="tab-content">
        <h1 style="margin-bottom: 25px; letter-spacing: -1px;">Новости</h1>
        <div class="news-card">
            <span class="news-tag">Система</span>
            <h2 style="font-size: 22px; margin-bottom: 10px;">Обновление системы очков</h2>
            <p style="color: var(--sub-text); line-height: 1.6; font-size: 14px;">
                Введена новая система: Победа (+5), Поражение (-2). Победа над лидером приносит +10 очков, поражение от слабого соперника стоит -5 очков.
            </p>
        </div>
    </div>

    <div id="tab-teams" class="tab-content">
        <h1 style="margin-bottom: 20px; letter-spacing: -1px;">Мировой рейтинг</h1>
        <table class="ranking-table" id="teams-list"></table>
    </div>

    <div id="tab-transfers" class="tab-content">
        <h1 style="margin-bottom: 25px; letter-spacing: -1px;">Трансферы</h1>
        <div id="transfers-list"></div>
    </div>
</main>

<div id="teamModal" class="modal">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <div id="modal-content"></div>
</div>

<script>

        ]},

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        
        document.getElementById('tab-' + id).classList.add('active');
        document.getElementById('link-' + id).classList.add('active');
        
        if(id === 'teams') renderTeams();
        if(id === 'transfers') renderTransfers();
    }

    function renderTeams() {
        const list = document.getElementById('teams-list');
        teamsData.sort((a, b) => b.p - a.p);
        let html = `<thead><tr><th>#</th><th>Команда</th><th style="text-align:right">PTS</th></tr></thead><tbody>`;
        teamsData.forEach((t, i) => {
            html += `
                <tr class="team-row" onclick="openTeam('${t.n}')">
                    <td style="color:var(--sub-text)">${(i+1).toString().padStart(2, '0')}</td>
                    <td style="font-size:15px">${t.n}</td>
                    <td style="text-align:right"><span class="pts-val">${t.p > 0 ? '+'+t.p : t.p}</span></td>
                </tr>`;
        });
        list.innerHTML = html + `</tbody>`;
    }

    function renderTransfers() {
        const list = document.getElementById('transfers-list');
        const items = [
            { nick: "w1nplays", from: "BPMP", to: "Quantum" },
            { nick: "Vyzyy", from: "None", to: "BPMP" }
        ];
        list.innerHTML = items.map(i => `
            <div class="transfer-card">
                <div>
                    <div class="t-nick">${i.nick}</div>
                    <div style="font-size:9px; color:var(--sub-text); text-transform:uppercase; margin-top:4px;">LTL Transfer Pool</div>
                </div>
                <div style="text-align:right">
                    <span style="color:var(--sub-text); font-size:13px;">${i.from}</span>
                    <span class="t-arrow">→</span>
                    <span style="font-weight:800; font-size:13px;">${i.to}</span>
                </div>
            </div>
        `).join('');
    }

    function openTeam(name) {
        const team = teamsData.find(t => t.n === name);
        const modal = document.getElementById('teamModal');
        const content = document.getElementById('modal-content');

        content.innerHTML = `
            <div class="modal-header">
                <h1 style="font-size:38px; font-weight:900; letter-spacing:-1.5px;">${team.n}</h1>
                <p style="color:#00b894; font-weight:800; text-transform:uppercase; font-size:11px; margin-top:5px; letter-spacing:1px;">Профиль организации</p>
            </div>
            
            <div class="match-stat-btn" onclick="alert('Детальная аналитика матча загружается...')">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-size:9px; text-transform:uppercase; color:var(--sub-text); font-weight:700;">Последний результат</div>
                        <div style="font-weight:900; font-size:18px; margin-top:2px;">${team.match}</div>
                    </div>
                    <div style="text-align:right">
                        <span style="display:inline-block; padding:5px 12px; border-radius:8px; color:#fff; font-size:10px; font-weight:900; background:${team.win ? 'var(--green-grad)' : 'var(--red-grad)'}">
                            ${team.win ? 'ПОБЕДА' : 'ПОРАЖЕНИЕ'}
                        </span>
                    </div>
                </div>
            </div>

            <h3 style="margin-top:30px; font-size:14px; text-transform:uppercase; color:var(--accent); font-weight:900;">Текущий ростер и статистика</h3>
            <div class="roster-grid">
                ${team.players.map(p => `
                    <div class="player-card">
                        <div style="width:100%; aspect-ratio:1; background:#f8fafc; border-radius:10px; display:flex; align-items:center; justify-content:center;">
                            <svg width="35" height="35" viewBox="0 0 24 24" fill="#e2e8f0"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        </div>
                        <div class="p-name">${p.nick}</div>
                        <div class="p-stat">Рейтинг: 1.00 • K/D/A: ${p.kda}</div>
                    </div>
                `).join('')}
            </div>
        `;
        modal.style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('teamModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>

</html>
