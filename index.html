<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Playoff Pick'Em</title>
    <style>
        body {
            background-color: #f4f6f9;
            color: #1e293b;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #1e293b;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 2rem;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab-btn {
            background: #cbd5e1;
            color: #334155;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #e28743;
            color: white;
        }

        .hidden { display: none !important; }

        /* Контейнер сетки */
        .bracket-container {
            display: flex;
            gap: 40px;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            height: 440px;
            gap: 10px;
        }

        .matchup {
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: #f1f5f9;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            width: 180px;
        }

        .slot {
            background: #e2e8f0;
            padding: 8px;
            border-radius: 4px;
            min-height: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .slot:hover {
            background: #cbd5e1;
        }

        .slot.selected {
            background: #e28743;
            color: white;
        }

        .slot select {
            width: 100%;
            border: none;
            background: transparent;
            font-weight: bold;
            color: #1e293b;
            font-size: 0.9rem;
            text-align: center;
            cursor: pointer;
        }

        .save-btn {
            background: #16a34a;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: background 0.2s;
        }

        .save-btn:hover { background: #15803d; }

        /* Таблица */
        .leaderboard-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            margin-bottom: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th { background-color: #f1f5f9; color: #1e293b; }

        .admin-btn {
            background: #475569; color: white; border: none; padding: 12px;
            font-size: 0.95rem; font-weight: bold; border-radius: 6px;
            cursor: pointer; align-self: flex-end; transition: background 0.2s;
        }
        .admin-btn:hover { background: #334155; }

        .status-badge {
            background: #fee2e2; color: #991b1b; padding: 4px 8px;
            border-radius: 4px; font-size: 0.85rem; font-weight: bold;
            display: inline-block; margin-bottom: 10px;
        }
        .status-badge.active { background: #dcfce7; color: #166434; }
    </style>
</head>
<body>

    <h1>CS2 Playoff Pick'Em</h1>

    <div class="tabs">
        <button class="tab-btn active" id="btn-picks" onclick="switchTab('picks')">Сетка Прогнозов</button>
        <button class="tab-btn" id="btn-table" onclick="switchTab('table')">Таблица результатов</button>
    </div>

    <div id="tab-content-picks" style="display: flex; flex-direction: column; align-items: center;">
        <div class="bracket-container">
            
            <div class="round">
                <h3>1/4 Финала</h3>
                <div class="matchup">
                    <div class="slot"><select id="q1-1" onchange="updateMatch(1, 1)"><option value="">Выбрать</option></select></div>
                    <div class="slot"><select id="q1-2" onchange="updateMatch(1, 2)"><option value="">Выбрать</option></select></div>
                </div>
                <div class="matchup">
                    <div class="slot"><select id="q2-1" onchange="updateMatch(2, 1)"><option value="">Выбрать</option></select></div>
                    <div class="slot"><select id="q2-2" onchange="updateMatch(2, 2)"><option value="">Выбрать</option></select></div>
                </div>
                <div class="matchup">
                    <div class="slot"><select id="q3-1" onchange="updateMatch(3, 1)"><option value="">Выбрать</option></select></div>
                    <div class="slot"><select id="q3-2" onchange="updateMatch(3, 2)"><option value="">Выбрать</option></select></div>
                </div>
                <div class="matchup">
                    <div class="slot"><select id="q4-1" onchange="updateMatch(4, 1)"><option value="">Выбрать</option></select></div>
                    <div class="slot"><select id="q4-2" onchange="updateMatch(4, 2)"><option value="">Выбрать</option></select></div>
                </div>
            </div>

            <div class="round">
                <h3>1/2 Финала</h3>
                <div class="matchup">
                    <div class="slot" id="sf1-1" onclick="advanceTeam('sf1-1', 'f-1')">Ожидание...</div>
                    <div class="slot" id="sf1-2" onclick="advanceTeam('sf1-2', 'f-1')">Ожидание...</div>
                </div>
                <div class="matchup">
                    <div class="slot" id="sf2-1" onclick="advanceTeam('sf2-1', 'f-2')">Ожидание...</div>
                    <div class="slot" id="sf2-2" onclick="advanceTeam('sf2-2', 'f-2')">Ожидание...</div>
                </div>
            </div>

            <div class="round">
                <h3>Финал</h3>
                <div class="matchup">
                    <div class="slot" id="f-1" onclick="advanceTeam('f-1', 'champion')">Ожидание...</div>
                    <div class="slot" id="f-2" onclick="advanceTeam('f-2', 'champion')">Ожидание...</div>
                </div>
            </div>

            <div class="round">
                <h3>Чемпион</h3>
                <div class="matchup" style="border-color: #e28743;">
                    <div class="slot" id="champion" style="background: #fff7ed; color: #e28743;">Победитель</div>
                </div>
            </div>

        </div>

        <button class="save-btn" onclick="savePredict()">Сохранить сетку</button>
    </div>

    <div class="leaderboard-section hidden" id="tab-content-table">
        <h2>Таблица лидеров плей-офф</h2>
        <div>
            <span class="status-badge" id="stage-status">Плей-офф идет (Очки заморожены)</span>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Место</th>
                    <th>Никнейм</th>
                    <th>Полуфиналисты</th>
                    <th>Финалисты</th>
                    <th>Чемпион</th>
                    <th>Очки</th>
                </tr>
            </thead>
            <tbody id="leaderboard-data"></tbody>
        </table>
        
        <button class="admin-btn" onclick="finishStage()">Завершить стадию (Посчитать очки)</button>
    </div>

    <script>
        // Список твоих 16 команд для выпадающего списка в 1/4
        const ALL_TEAMS = [
            "ROSE team", "Voidfall", "Remast", "Vanity Team", "BAREBUH", "BPMP", "Evo team", "Blood Owner",
            "Team serpent", "Vanters", "Demon wings", "Reapers", "GA", "GEN3", "VitaL Team", "VitaL Yong Boys"
        ];

        // РЕАЛЬНЫЕ РЕЗУЛЬТАТЫ (Замени на настоящие, когда турнир закончится)
        const REAL_PLAYOFF = {
            semi: ["ROSE team", "Voidfall", "BPMP", "GA"],
            final: ["ROSE team", "GA"],
            champion: "ROSE team"
        };

        let isStageFinished = false;
        let predictionsList = [];

        // Заполняем селекторы четвертьфинала командами
        window.onload = function() {
            const selects = document.querySelectorAll('select');
            selects.forEach(sel => {
                ALL_TEAMS.forEach(team => {
                    let opt = document.createElement('option');
                    opt.value = team;
                    opt.textContent = team;
                    sel.appendChild(opt);
                });
            });
        };

        function switchTab(tab) {
            if (tab === 'picks') {
                document.getElementById('btn-picks').classList.add('active');
                document.getElementById('btn-table').classList.remove('active');
                document.getElementById('tab-content-picks').classList.remove('hidden');
                document.getElementById('tab-content-table').classList.add('hidden');
            } else {
                document.getElementById('btn-table').classList.add('active');
                document.getElementById('btn-picks').classList.remove('active');
                document.getElementById('tab-content-table').classList.remove('hidden');
                document.getElementById('tab-content-picks').classList.add('hidden');
                renderLeaderboard();
            }
        }

        // Логика автоматического переноса из выпадающего списка в полуфинал
        function updateMatch(matchNum, slotNum) {
            const val = document.getElementById(`q${matchNum}-${slotNum}`).value;
            const targetId = `sf${Math.ceil(matchNum/2)}-${matchNum % 2 === 0 ? 2 : 1}`;
            
            // Очищаем зависимые слоты при изменении
            document.getElementById(targetId).textContent = val || "Ожидание...";
            document.getElementById(targetId).classList.remove('selected');
        }

        // Клик для продвижения команды дальше по сетке
        function advanceTeam(currentId, nextId) {
            const teamName = document.getElementById(currentId).textContent;
            if (teamName === "Ожидание..." || teamName === "") return;

            // Подсвечиваем выбор
            const parent = document.getElementById(currentId).parentElement;
            parent.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            document.getElementById(currentId).classList.add('selected');

            // Переносим в следующий раунд
            const nextSlot = document.getElementById(nextId);
            nextSlot.textContent = teamName;
            nextSlot.classList.remove('selected');

            // Если поменяли финалиста, очищаем чемпиона
            if (nextId.startsWith('f-')) {
                document.getElementById('champion').textContent = "Победитель";
            }
        }

        // Сохранение результатов
        function savePredict() {
            const sf = [
                document.getElementById('sf1-1').textContent, document.getElementById('sf1-2').textContent,
                document.getElementById('sf2-1').textContent, document.getElementById('sf2-2').textContent
            ];
            const f = [document.getElementById('f-1').textContent, document.getElementById('f-2').textContent];
            const champ = document.getElementById('champion').textContent;

            if (sf.includes("Ожидание...") || f.includes("Ожидание...") || champ === "Победитель") {
                alert("Заполните всю сетку до конца (выберите победителей кликами)!");
                return;
            }

            const nickname = prompt('Введите ваш никнейм:');
            if (!nickname || nickname.trim() === "") {
                alert('Никнейм пустой!');
                return;
            }

            predictionsList.push({
                name: nickname,
                semi: sf,
                final: f,
                champion: champ,
                points: 0
            });

            alert(`Сетка игрока ${nickname} сохранена!`);
            switchTab('table');
        }

        // Расчет очков админом
        function finishStage() {
            isStageFinished = true;
            document.getElementById('stage-status').textContent = "Стадия завершена! Очки подсчитаны.";
            document.getElementById('stage-status').classList.add('active');

            predictionsList.forEach(user => {
                let score = 0;
                // +3 за каждого угаданного полуфиналиста, финалиста и чемпиона
                user.semi.forEach(t => { if(REAL_PLAYOFF.semi.includes(t)) score += 3; });
                user.final.forEach(t => { if(REAL_RESULTS = REAL_PLAYOFF.final.includes(t)) score += 3; });
                if(user.champion === REAL_PLAYOFF.champion) score += 3;

                user.points = score;
            });

            predictionsList.sort((a, b) => b.points - a.points);
            renderLeaderboard();
        }

        function renderLeaderboard() {
            const tbody = document.getElementById('leaderboard-data');
            tbody.innerHTML = '';

            if (predictionsList.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#94a3b8;">Таблица пуста. Заполните сетку!</td></tr>';
                return;
            }

            predictionsList.forEach((user, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${index + 1}</strong></td>
                    <td>${user.name}</td>
                    <td style="color:#2563eb; font-size:0.85rem;">${user.semi.join(', ')}</td>
                    <td style="color:#16a34a; font-size:0.85rem;">${user.final.join(', ')}</td>
                    <td style="color:#e28743; font-weight:bold;">${user.champion}</td>
                    <td><strong>${user.points}</strong></td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
