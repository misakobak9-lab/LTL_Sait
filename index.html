<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTL.com | Official</title>
    <style>
        :root {
            /* Белый градиент и акцентные цвета */
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #ffffff 100%);
            --accent: #2d3436;
            --sub-text: #636e72;
            --card-bg: rgba(255, 255, 255, 0.8);
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body { 
            background: var(--bg-gradient); 
            color: var(--accent); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 40px 8%;
            text-align: center;
        }

        .logo {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--accent);
            text-decoration: none;
        }

        .logo span { color: #00b894; } /* Небольшой цветовой акцент для точки */

        main {
            flex: 1;
            width: 90%;
            max-width: 600px;
            text-align: center;
            padding-top: 50px;
        }

        .dev-badge {
            display: inline-block;
            background: #dfe6e9;
            color: var(--sub-text);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        h2 { font-size: 32px; margin-bottom: 15px; font-weight: 800; }
        p { color: var(--sub-text); margin-bottom: 40px; line-height: 1.6; }

        /* Секция предложки */
        .suggestion-box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.03);
            backdrop-filter: blur(10px);
        }

        .suggestion-box h3 {
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #dfe6e9;
            background: #f9f9f9;
            resize: none;
            font-size: 14px;
            margin-bottom: 15px;
            outline: none;
            transition: 0.3s;
        }

        textarea:focus { border-color: #00b894; background: #fff; }

        .send-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .send-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        footer {
            padding: 40px;
            font-size: 13px;
            color: #b2bec3;
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">LTL<span>.</span>com</a>
</header>

<main>
    <div class="dev-badge">Status: Maintenance</div>
    <h2>В разработке</h2>
    <p>Мы полностью переосмысляем платформу. Скоро здесь появятся обновленные рейтинги, новости и система трансферов.</p>

    <!-- Секция предложки -->
    <div class="suggestion-box">
        <h3>Есть идея или новость?</h3>
        <textarea id="suggestText" placeholder="Напиши нам что-нибудь..."></textarea>
        <button class="send-btn" onclick="sendIdea()">Отправить предложение</button>
    </div>
</main>

<footer>
    &copy; 2026 LTL Community. All rights reserved.
</footer>

<script>
    function sendIdea() {
        const text = document.getElementById('suggestText').value;
        if(text.trim() === "") {
            alert("Сначала напиши что-нибудь!");
            return;
        }
        
        // Тут можно будет подключить твоего бота позже
        alert("Спасибо! Твоя идея получена и будет передана админам LTL.com.");
        document.getElementById('suggestText').value = "";
    }
</script>

</body>
</html>
