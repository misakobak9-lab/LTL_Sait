<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTL-sait | Киберспортивный портал</title>
    <style>
        body { background-color: #0b0e13; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #0b0e13; border-bottom: 2px solid #ff9800; position: sticky; top: 0; z-index: 100; }
        .logo { color: #ff9800; font-weight: bold; font-size: 24px; text-decoration: none; }
        nav button { background: none; border: none; color: #adb5bd; cursor: pointer; margin-left: 20px; font-size: 16px; transition: 0.3s; padding: 5px 10px; }
        nav button:hover, nav button.active { color: #ff9800; border-bottom: 2px solid #ff9800; }
        main { padding: 20px 5%; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background-color: #161b22; border-radius: 8px; padding: 20px; border: 1px solid #2d333b; margin-bottom: 20px; }
        h2 { color: #ff9800; margin-top: 0; font-size: 22px; }

        /* Стили матчей */
        .match-row { display: flex; justify-content: space-between; align-items: center; background: #1c2128; padding: 15px; border-radius: 6px; margin-bottom: 10px; border: 1px solid #2d333b; }
        .match-team { font-weight: bold; width: 40%; }
        .match-info { text-align: center; width: 20%; color: #ff9800; font-weight: bold; }
        .vs { color: #8b949e; font-size: 12px; margin: 0 10px; }

        /* Турнирная сетка текстом */
        .bracket-list { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .bracket-pair { background: #1c2128; padding: 10px; border-radius: 6px; border-left: 3px solid #ff9800; }
        .bracket-pair div { padding: 3px 0; display: flex; justify-content: space-between; }

        /* Прочее */
        .rating-table { width: 100%; border-collapse: collapse; }
        .rating-table td { padding: 15px; border-bottom: 1px solid #2d333b; }
        .team-link { color: #ffffff; text-decoration: none; cursor: pointer; font-weight: bold; }
        .back-btn { background: #ff9800; color: #000; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
        .tg-link { color: #0088cc; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo">LTL-sait</div>
    <nav>
        <button onclick="openTab('matches')" id="defaultOpen">Матчи</button>
        <button onclick="openTab('rating')">Рейтинг</button>
        <button onclick="openTab('tournaments')">Турниры</button>
        <button onclick="openTab('transfers')">Трансферы</button>
    </nav>
</header>

<main>
    <div id="matches" class="tab-content">
        <div class="card">
            <h2>📅 Ближайшие игры</h2>
            <div class="match-row">
                <div class="match-team" style="text-align: right;">BPMP</div>
                <div class="match-info"><span class="vs">VS</span> 18:40</div>
                <div class="match-team">GA</div>
            </div>
            <p style="text-align: center; color: #8b949e; font-size: 13px;">Т

</body>
</html>
