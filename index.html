<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LTL.com | Esports Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fcfcfd;
            --accent: #0f172a;
            --sub-text: #64748b;
            --border: #e2e8f0;
            --green-grad: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            --red-grad: linear-gradient(135deg, #ff7675 0%, #d63031 100%);
            --hover-light: rgba(0, 184, 148, 0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--accent); }

        header { 
            padding: 15px 5%; 
            display: flex; flex-direction: column; gap: 15px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; 
        }
        @media (min-width: 768px) { header { flex-direction: row; justify-content: space-between; padding: 20px 8%; } }

        .logo { font-size: 24px; font-weight: 900; cursor: pointer; text-decoration: none; color: inherit; }
        .logo span { background: var(--green-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        nav { display: flex; gap: 15px; overflow-x: auto; scrollbar-width: none; }
        .nav-link { text-decoration: none; color: var(--sub-text); font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; padding: 5px 0; white-space: nowrap; }
        .nav-link.active { color: var(--accent); border-bottom: 2px solid #00b894; }

        main { padding: 30px 5%; max-width: 1100px; margin: 0 auto; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Ranking Table */
        .ranking-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .ranking-table th { text-align: left; padding: 10px; font-size: 10px; text-transform: uppercase; color: var(--sub-text); }
        .team-row { cursor: pointer; }
        .team-row td { padding: 20px 15px; background: #fff; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); font-weight: 700; }
        .team-row td:first-child { border-left: 1px solid var(--border); border-radius: 12px 0 0 12px; }
        .team-row td:last-child { border-right: 1px solid var(--border); border-radius: 0 12px 12px 0; text-align: right; }
        .team-row:hover td { background: var(--hover-light); }

        .pts-val { background: var(--green-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; overflow-y: auto; padding: 40px 5%; }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; }

        .modal-header { text-align: center; margin-bottom: 30px; }
        .last-match-box { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin: 20px 0; cursor: pointer; transition: 0.2s; }
        .last-match-box:hover { transform: translateY(-2px); border-color: #00b894; }

        .roster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .player-card { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .p-stat { font-size: 11px; color: var(--sub-text); margin-top: 5px; }

        /* Transfers */
        .transfer-card { background: #fff; border: 1px solid var(--border); padding: 20px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .t-arrow { color: #00b894; font-weight: 900; }

        footer { padding: 40px; text-align: center; font-size: 11px; color: var(--sub-text); }
    </style>
</head>
<body onload="showTab('teams')">

<header>
    <a class="logo" onclick="showTab('teams')">LTL<span>.</span>com</a>
    <nav>
        <a class="nav-link" id="link-teams" onclick="showTab('teams')">Команды</a>
        <a class="nav-link" id="link-transfers" onclick="showTab('transfers')">Трансферы</a>
    </nav>
</header>

<main>
    <div id="tab-teams" class="tab-content">

        <div id="transfers-list"></div>

</main>

    <div id="modal-content"></div>
</div>

    const transfers = [
        { p: "w1nplays", from: "BPMP", to: "Quantum", date: "Сегодня" },

    ];

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        document.getElementById('link-' + id).classList.add('active');
        if(id === 'teams') renderTeams();
        if(id === 'transfers') renderTransfers();
    }

    function renderTeams() {
        const list = document.getElementById('teams-list');
        teams.sort((a, b) => b.p - a.p);
        let html = `<tr><th>#</th><th>Команда</th><th style="text-align:right">PTS</th></tr>`;
        teams.forEach((t, i) => {
            html += `
                <tr class="team-row" onclick="openTeam('${t.n}')">
                    <td style="color:var(--sub-text)">${i+1}</td>
                    <td>${t.n}</td>
                    <td class="pts-val">${t.p > 0 ? '+'+t.p : t.p}</td>
                </tr>`;
        });
        list.innerHTML = html;
    }

    function renderTransfers() {
        const list = document.getElementById('transfers-list');
        list.innerHTML = transfers.map(t => `
            <div class="transfer-card">
                <div>
                    <div style="font-weight:900; font-size:16px;">${t.p}</div>
                    <div style="font-size:10px; color:var(--sub-text); text-transform:uppercase;">${t.date}</div>
                </div>
                <div style="text-align:right">
                    <span style="color:var(--sub-text)">${t.from}</span>
                    <span class="t-arrow"> → </span>
                    <span style="font-weight:700">${t.to}</span>
                </div>
            </div>
        `).join('');
    }

    function openTeam(name) {
        const team = teams.find(t => t.n === name);
        const modal = document.getElementById('teamModal');
        const content = document.getElementById('modal-content');

        content.innerHTML = `
            <div class="modal-header">
                <h1 style="font-size:42px; font-weight:900;">${team.n}</h1>
                <p style="color:var(--sub-text); text-transform:uppercase; font-size:11px; letter-spacing:2px;">Статистика состава</p>
            </div>
            
            <div class="last-match-box">
                <div style="font-size:10px; text-transform:uppercase; color:var(--sub-text); margin-bottom:5px;">Последний результат</div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:900; font-size:18px;">${team.lastMatch}</span>
                    <span style="padding:4px 12px; border-radius:20px; color:#fff; font-size:10px; font-weight:900; background:${team.stat === 'W' ? 'var(--green-grad)' : 'var(--red-grad)'}">
                        ${team.stat === 'W' ? 'WIN' : 'LOSS'}
                    </span>
                </div>
            </div>

            <div class="roster-grid">
                ${team.players.map(p => `
                    <div class="player-card">
                        <div style="width:100%; aspect-ratio:1; background:#f1f5f9; border-radius:8px; margin-bottom:10px; display:flex; align-items:center; justify-content:center;">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="#cbd5e1"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        </div>
                        <div style="font-weight:800; font-size:13px;">${p.nick}</div>
                        <div class="p-stat">K/D/A: ${p.kda}</div>
                    </div>
                `).join('')}
            </div>
        `;
        modal.style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('teamModal').style.display = 'none';
