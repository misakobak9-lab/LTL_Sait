<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTL PRESTIGE | VICTORY HUB</title>
    <style>
        :root {
            --brand-g: linear-gradient(135deg, #ff9800 0%, #ff5722 50%, #e91e63 100%);
            --brand-neon: 0 0 40px rgba(255, 87, 34, 0.7);
            --bg-deep: #020406;
            --glass: rgba(255, 255, 255, 0.03);
            --text-h: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-deep); color: var(--text-h); background: linear-gradient(45deg, #020406, #0d1117, #020406); background-attachment: fixed; }

        header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(2, 4, 6, 0.9); backdrop-filter: blur(25px);
            border-bottom: 2px solid transparent; border-image: var(--brand-g) 1;
            padding: 15px 8%; display: flex; justify-content: space-between; align-items: center;
        }

        .logo h1 { font-size: 28px; font-weight: 1000; letter-spacing: 4px; background: var(--brand-g); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .nav-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-weight: 900; font-size: 10px; text-transform: uppercase; padding: 10px 18px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-left: 8px; }
        .nav-btn.active { background: var(--brand-g); color: #000; border: none; box-shadow: var(--brand-neon); }

        main { padding: 30px 8%; max-width: 1200px; margin: 0 auto; }
        .view { display: none; }

        .m-title { font-size: 26px; font-weight: 1000; margin: 30px 0 15px; text-transform: uppercase; background: var(--brand-g); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .card { background: var(--glass); border-radius: 20px; padding: 45px 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; font-weight: 1000; cursor: pointer; text-transform: uppercase; }
        .card:hover { border-color: #ff9800; box-shadow: var(--brand-neon); transform: translateY(-5px); }

        .table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .tr { background: var(--glass); transition: 0.2s; cursor: pointer; border-radius: 15px; }
        .tr:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); box-shadow: var(--brand-neon); }
        .td { padding: 20px; font-weight: 900; text-transform: uppercase; }
        .td-val { text-align: right; color: #ff9800; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(15px); }
        .modal-content { background: #0a0c10; border: 2px solid #ff5722; border-radius: 15px; width: 90%; max-width: 450px; padding: 30px; box-shadow: var(--brand-neon); }
        .p-row { background: rgba(255,255,255,0.04); padding: 15px; margin-bottom: 8px; border-radius: 10px; display: flex; justify-content: space-between; font-weight: 900; }
        .close-btn { background: var(--brand-g); color: #000; border: none; font-weight: 1000; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

<header>
    <div class="logo"><h1>LTL-PRESTIGE</h1></div>
    <nav>
        <button class="nav-btn active" onclick="v('home', this)">Главная</button>
        <button class="nav-btn" onclick="v('teams', this)">Команды</button>
        <button class="nav-btn" onclick="v('rank', this)">Рейтинг</button>
    </nav>
</header>

<main>
    <div id="v-home" class="view" style="display: block;">
        <div style="background: var(--brand-g); padding: 45px; border-radius: 25px; color: #000; text-align: center; box-shadow: var(--brand-neon);">
            <h2 style="font-size: 36px; font-weight: 1000;">GA VICTORY! 🏆</h2>
            <p style="font-weight: 900; margin-top: 10px;">GA ДОБАВЛЯЮТ +5 PTS В КОПИЛКУ</p>
        </div>
    </div>

    <div id="v-teams" class="view">
        <h2 class="m-title">Организации</h2>
        <div class="grid" id="t-grid"></div>
    </div>

    <div id="v-rank" class="view">
        <h2 class="m-title">Рейтинг Команд</h2>
        <table class="table" id="r-table"></table>
    </div>
</main>

<div id="tModal" class="modal"><div class="modal-content"><h2 id="m-tname" style="color:#ff9800; margin-bottom:20px; text-transform: uppercase; text-align:center;"></h2><div id="m-plist"></div><button onclick="closeM()" class="close-btn">ЗАКРЫТЬ</button></div></div>

<script>
    const teams = [
        { n: "GA", p: 33, pl: ["N3XXT", "m1laps", "FullZ3r0", "fR0-sT", "Kot1x*", "Weather"] },
        { n: "GEN3", p: 37, pl: ["RaZzychka", "Gho1l", "pupap1", "yanimagu", "chydno1"] },
        { n: "Plaxon Team", p: 35, pl: ["1ntER", "soj", "antikyla", "x1no"] },
        { n: "Quantum ESPORT", p: 18, pl: ["matana_VOL", "bloodshed", "dalbanzik", "Batonesy", "Agera"] }
    ];

    function v(id, btn) {
        document.querySelectorAll('.view').forEach(e => e.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('v-' + id).style.display = 'block';
        btn.classList.add('active');
        if(id === 'teams') rt();
        if(id === 'rank') rr();
    }

    function rt() {
        document.getElementById('t-grid').innerHTML = teams.map(t => `<div class="card" onclick="st('${t.n}')">${t.n}</div>`).join('');
    }

    function rr() {
        document.getElementById('r-table').innerHTML = [...teams].sort((a,b)=>b.p-a.p).map((t,i)=>`<tr class="tr" onclick="st('${t.n}')"><td class="td">${i+1}</td><td class="td">${t.n}</td><td class="td td-val">${t.p} PTS</td></tr>`).join('');
    }

    function st(n) {
        const t = teams.find(x => x.n === n);
        document.getElementById('m-tname').innerText = t.n;
        document.getElementById('m-plist').innerHTML = t.pl.map(p => `<div class="p-row"><span>${p}</span></div>`).join('');
        document.getElementById('tModal').style.display = 'flex';
    }

    function closeM() { document.getElementById('tModal').style.display = 'none'; }
    window.onload = () => { rt(); rr(); };
</script>
</body>
</html>
