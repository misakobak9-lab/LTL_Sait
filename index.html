<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTL.com | Official</title>
    <style>
        :root {
            --bg: #ffffff;
            --accent: #1a1a1a;
            --sub-text: #888888;
            --border: #eeeeee;
            --green: #00b894;
            --hover-bg: #f8f9fa;
            --overlay: rgba(255, 255, 255, 0.98);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--accent); min-height: 100vh; }

        header { padding: 30px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: #fff; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 26px; font-weight: 900; color: var(--accent); text-decoration: none; cursor: pointer; }
        .logo span { color: var(--green); }

        nav { display: flex; gap: 20px; }
        .nav-link { text-decoration: none; color: var(--sub-text); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
        .nav-link:hover, .nav-link.active { color: var(--accent); }

        main { flex: 1; padding: 40px 8%; max-width: 1000px; margin: 0 auto; width: 100%; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .ranking-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .ranking-table th { text-align: left; padding: 15px; border-bottom: 2px solid var(--accent); font-size: 12px; color: var(--sub-text); }
        .ranking-table td { padding: 15px; border-bottom: 1px solid var(--border); font-weight: 600; transition: all 0.2s ease; }
        
        .team-row { cursor: pointer; }
        .team-row:hover td { background: var(--hover-bg); color: var(--green); }
        
        .rank-val { text-align: right; color: var(--green); font-weight: 800; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay);
            z-index: 1000;
            overflow-y: auto;
            padding: 60px 8%;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-modal { position: fixed; top: 30px; right: 8%; font-size: 40px; cursor: pointer; color: var(--accent); z-index: 1100; }

        .modal-header { text-align: center; margin-bottom: 50px; }
        .modal-team-name { font-size: 64px; font-weight: 900; text-transform: uppercase; }
        .modal-team-top { color: var(--green); font-size: 18px; font-weight: 700; margin-top: 10px; }

        .modal-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px; }
        .roster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; }
        .player-card { text-align: center; }
        
        .silhouette {
            width: 110px; height: 140px;
            background: #ffffff;
            margin: 0 auto 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            display: flex; align-items: flex-end; justify-content: center;
            overflow: hidden;
        }
        .silhouette svg { width: 90%; height: 90%; fill: #000000; } 

        .p-name { font-size: 12px; font-weight: 800; text-transform: uppercase; }
        .p-rank { font-size: 12px; color: var(--green); font-weight: 700; }

        .achievements h3 { margin-bottom: 20px; font-size: 20px; border-left: 4px solid var(--green); padding-left: 15px; }
        .empty-ach { color: var(--sub-text); font-style: italic; font-size: 14px; }

        footer { padding: 40px; text-align: center; font-size: 12px; color: var(--sub-text); border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<header>
    <a class="logo" onclick="showTab('main')">LTL<span>.</span>com</a>
    <nav>
        <a class="nav-link" onclick="showTab('teams')">Команды</a>
        <a class="nav-link" onclick="showTab('players')">Игроки</a>
        <a class="nav-link" onclick="showTab('transfers')">Трансферы</a>
        <a class="nav-link" onclick="showTab('news')">Новости</a>
        <a class="nav-link" onclick="showTab('tournaments')">Турниры</a>
    </nav>
</header>

<main>
    <div id="tab-main" class="tab-content active">
        <h1 style="text-align:center; margin-top: 50px;">LTL Hub</h1>
        <p style="text-align:center; color: var(--sub-text);">Актуальные составы и рейтинги команд.</p>
    </div>

    <div id="tab-teams" class="tab-content">
        <table class="ranking-table" id="teams-list"></table>
    </div>

    <div id="tab-players" class="tab-content">
        <table class="ranking-table" id="players-list"></table>
    </div>

    <div id="tab-transfers" class="tab-content"><h2 style="text-align:center">В разработке</h2></div>
    <div id="tab-news" class="tab-content"><h2 style="text-align:center">В разработке</h2></div>
    <div id="tab-tournaments" class="tab-content"><h2 style="text-align:center">В разработке</h2></div>
</main>

<div id="teamModal" class="modal">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <div id="modal-content"></div>
</div>

<script>
    const data = [
        { n: "GA", p: 0, pl: ["N3XXT", "m1laps", "FullZ3r0", "fR0-sT", "Kot1x*"] },
        { n: "GEN3", p: 0, pl: ["RaZzychka", "Gho1l", "pupap1", "yanimagu", "chydno1"] },
        { n: "Ance Team", p: 0, pl: ["m1dor3", "WeyZ1", "HOLLY SHIT", "Onlys1dj", "1CE", "Rar3"] },
        { n: "Quantum Esports", p: 0, pl: ["H20lazzz", "dixer.", "SINTEXX", "MANTANA"] },
        { n: "PLOHISHI", p: 0, pl: ["Patemon", "Turbo", "C1t1Q", "Waravmax", "Markbon"] },
        { n: "BPMP", p: 0, pl: ["W1rr0U", "ShAr1ks", "LeetOnsy", "Hokage", "W1nlays"] },
        { n: "FRACTAL TEAM", p: 0, pl: ["N1xie", "Fridar_fair", "kayserrr", "s1to666", "Vero1ksit"] },
        { n: "barebuh team", p: 0, pl: ["Aori", "r3kn", "Leha epta", "goidmen", "blessedrecode", "haZe (Sub)", "vazovsk11 (Sub)"] },
        { n: "Akatsura", p: 0, pl: ["spokyso", "sojerio", "Sale", "ToughShark", "squeeze1221", "g1nger10"] },
        { n: "rose team", p: 0, pl: ["r3lad", "inversion", "shado4www", "dagirkaa", "m1dor3kun"] },
        { n: "Blood Owners", p: 0, pl: ["S0plen0k", "Cry", "mAVR1K", "Semen41K", "Lwftaze"] },
        { n: "Remast", p: 0, pl: ["Maper", "M3t1sArK", "NEGATIVE", "colda1h", "3XC3LL3NT"] },
        { n: "Ventus Axi", p: 0, pl: ["m0nday", "shiy", "sh3f", "neetsky", "wigzzes"] },
        { n: "Warm Ray", p: 0, pl: ["hayzen", "R4zor", "YakstO", "ZOVy", "Rexen_"] }
    ];

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        if (id === 'teams') renderTeams();
        if (id === 'players') renderPlayers();
    }

    function renderTeams() {
        let html = `<tr><th>#</th><th>Организация</th><th class="rank-val">PTS</th></tr>`;
        data.forEach((t, i) => {
            html += `<tr class="team-row" onclick="openTeam('${t.n}', ${i+1})">
                <td>${i+1}</td>
                <td>${t.n}</td>
                <td class="rank-val">${t.p}</td>
            </tr>`;
        });
        document.getElementById('teams-list').innerHTML = html;
    }

    function renderPlayers() {
        let html = `<tr><th>Игрок</th><th>Команда</th><th class="rank-val">Rating</th></tr>`;
        data.forEach(t => {
            t.pl.forEach(p => {
                html += `<tr><td>${p}</td><td style="color:#888; font-size:12px">${t.n}</td><td class="rank-val">1.00</td></tr>`;
            });
        });
        document.getElementById('players-list').innerHTML = html;
    }

    function openTeam(name, rank) {
        const team = data.find(t => t.n === name);
        const modal = document.getElementById('teamModal');
        const content = document.getElementById('modal-content');

        let playersHtml = '';
        team.pl.forEach(p => {
            playersHtml += `
                <div class="player-card">
                    <div class="silhouette">
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    </div>
                    <div class="p-name">${p}</div>
                    <div class="p-rank">1.00</div>
                </div>
            `;
        });

        content.innerHTML = `
            <div class="modal-header">
                <h1 class="modal-team-name">${team.n}</h1>
                <p class="modal-team-top">МЕСТО В РЕЙТИНГЕ: #${rank}</p>
            </div>
            <div class="modal-grid">
                <div class="roster">
                    <h3 style="margin-bottom:20px; text-transform:uppercase; font-size:14px;">Активный состав</h3>
                    <div class="roster-grid">${playersHtml}</div>
                </div>
                <div class="achievements">
                    <h3>Достижения</h3>
                    <p class="empty-ach">Достижений пока нет</p>
                </div>
            </div>
        `;

        modal.style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('teamModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>

<footer>&copy; 2026 LTL.com</footer>
</body>
</html>
